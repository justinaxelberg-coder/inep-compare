# Scoring weights — all configurable without touching code
# Weights within each dimension sum to 1.0
# Dimension weights used for overall composite score

dimension_weights:
  coverage: 0.20
  data_quality: 0.20
  reliability: 0.15
  accessibility: 0.20
  social_impact: 0.10
  governance: 0.10
  innovation_link: 0.05    # only scored for innovation sources

# Sub-dimension weights
coverage:
  institutional_coverage: 0.35
  field_coverage: 0.20
  temporal_coverage: 0.15
  language_coverage: 0.20
  geographic_bias: 0.10
  equity_representation: 0.10   # sums slightly over — normalised at runtime

data_quality:
  completeness: 0.30
  disambiguation_quality: 0.30
  deduplication: 0.20
  timeliness: 0.20

reliability:
  temporal_stability: 0.25
  inter_source_agreement: 0.30
  methodological_transparency: 0.25
  reproducibility: 0.20

accessibility:
  barcelona_alignment: 0.30
  api_availability: 0.20
  licensing_model: 0.25
  cost_to_br_hei: 0.15
  practical_usability: 0.10

social_impact:
  sdg_coverage: 0.25
  policy_citations: 0.20
  public_engagement: 0.20
  oa_percentage: 0.20
  geographic_social_context: 0.15

governance:
  ownership_transparency: 0.25
  sustainability_risk: 0.25
  community_governance: 0.25
  data_portability: 0.25

innovation_link:
  npl_link_rate: 0.40        # paper-patent NPL back-references (research→innovation bridge)
  patent_count_score: 0.30   # HEI as patent assignee (institutional IP output)
  intl_family_score: 0.30    # international patent families (global reach)

# Confidence tier thresholds (N = number of records)
# Must match sample_config.yaml
confidence_tiers:
  reliable: 200
  moderate: 50
  low: 10
  insufficient: 0

# Divergence flag threshold (% discrepancy between two sources)
divergence_threshold: 0.15
